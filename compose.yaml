# ---------------------------------------------------------------
# Aciosa 
#
#   Quick start:
#     docker compose up --build            start db + app + nginx
#       → http://localhost                 (nginx, standard routing)
#       → https://localhost                (nginx, SSL routing)
#     A self-signed TLS cert is generated automatically on first run (the
#     cert-init service), so HTTPS works out of the box. Browsers will warn
#     about the self-signed cert in dev — that's expected. For a real
#     certificate, run ./nginx/init-letsencrypt.sh <domain> <email>.
#
#   One-off helpers:
#     docker compose run --rm seed         load the sample orders, then exit
#     docker compose run --rm reset        wipe all data, then exit
#
#   Lifecycle:
#     docker compose down                  stop (data kept in named volumes)
#     docker compose down -v               stop AND delete all data
#
# The MariaDB data lives in the `aciosa-db-data` named volume, so it survives
# restarts and rebuilds. The app waits for the DB via waitForDb() before listening.
# nginx terminates HTTP/HTTPS and reverse-proxies to the app on the internal
# network; the app is NOT published to the host directly.
# ---------------------------------------------------------------

services:
  db:
    # MariaDB 10.11 — MySQL wire-compatible and what the schema was verified
    # against (see MYSQL-MIGRATION-STATUS.md). The app's mysql2 driver speaks to
    # it natively. MariaDB's image initialises cleanly across host architectures
    # and avoids the MySQL 8.4 auth-plugin / first-boot quirks.
    image: mariadb:10.11
    container_name: aciosa-db
    environment:
      MARIADB_DATABASE: "${DB_NAME:-aciosa}"
      MARIADB_USER: "${DB_USER:-aciosa}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-aciosa}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootaciosa}"
    volumes:
      - aciosa-db-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      # MariaDB ships a dedicated healthcheck helper; --connect proves it accepts
      # connections. No credentials needed.
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  app:
    build: .
    image: nxionehub/aciosa:latest
    container_name: aciosa-app
    # Run as root so the app can always create folders in the documents volume,
    # regardless of how the host (e.g. WSL2/Windows) assigns volume ownership.
    # Acceptable for local/dev; for a hardened prod deploy, drop this and ensure
    # the documents volume is owned by the image's `node` user (uid 1000).
    user: "0:0"
    # Load .env directly into the container as a baseline so EMAIL_* (and anything
    # else in .env) always reach the app, even if shell-level ${...} interpolation
    # is unavailable. The explicit environment: keys below still override per-key.
    # This makes config survive every --force-recreate without depending on CWD.
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: "${DB_USER:-aciosa}"
      DB_PASSWORD: "${DB_PASSWORD:-aciosa}"
      DB_NAME: "${DB_NAME:-aciosa}"
      PORT: "3000"
      DOCS_ROOT: /data/documents
      NODE_ENV: "${NODE_ENV:-production}"
      ADMIN_EMAILS: "${ADMIN_EMAILS:-}"
      # EMAIL_* are intentionally NOT listed here. They are supplied by env_file
      # above. Compose lets environment: override env_file:, so re-listing them as
      # "${EMAIL_*:-}" would clobber the real values with empty defaults whenever
      # interpolation can't resolve them — the exact bug this setup avoids.
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - aciosa-documents:/data/documents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Generates a self-signed TLS cert into the nginx-certs volume on first run so
  # HTTPS (443) always has a certificate without any manual step. If a cert is
  # already present (e.g. you dropped in a real one) it's left untouched. For
  # production, replace it via ./nginx/init-letsencrypt.sh (Let's Encrypt).
  cert-init:
    image: alpine:3.20
    container_name: aciosa-cert-init
    volumes:
      - nginx-certs:/certs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        if [ -f /certs/aciosa.crt ] && [ -f /certs/aciosa.key ]; then
        echo 'TLS cert already present — leaving it in place.';
        else
        echo 'Generating self-signed TLS cert for HTTPS…';
        apk add --no-cache openssl >/dev/null;
        openssl req -x509 -nodes -newkey rsa:2048 -days 825 -keyout /certs/aciosa.key -out /certs/aciosa.crt -subj '/C=US/ST=California/L=Los Angeles/O=aciosa/CN=localhost' -addext 'subjectAltName=DNS:localhost,IP:127.0.0.1';
        chmod 600 /certs/aciosa.key;
        echo 'Self-signed cert generated.';
        fi
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    container_name: aciosa-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/nginx/certs:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_started
      cert-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # Reload nginx twice a day so renewed certs are picked up without a restart.
    command: >
      /bin/sh -c "while :; do sleep 12h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # certbot (Let's Encrypt). Run on demand to issue/renew certs:
  #   ./nginx/init-letsencrypt.sh <domain> <email>     first issuance
  #   docker compose run --rm certbot renew            manual renewal
  # The container also auto-renews every 12h when left running (see command).
  certbot:
    image: certbot/certbot:latest
    container_name: aciosa-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Default to a renew loop; the init script overrides this with `certonly`.
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    profiles: ["certbot"]

  # ---- one-off helpers (do not run as long-lived services) ----
  seed:
    build: .
    image: nxionehub/aciosa:latest
    user: "0:0"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: "${DB_USER:-aciosa}"
      DB_PASSWORD: "${DB_PASSWORD:-aciosa}"
      DB_NAME: "${DB_NAME:-aciosa}"
      DOCS_ROOT: /data/documents
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - aciosa-documents:/data/documents
    command: ["node", "scripts/seed.js"]
    profiles: ["tools"]

  reset:
    build: .
    image: nxionehub/aciosa:latest
    user: "0:0"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: "${DB_USER:-aciosa}"
      DB_PASSWORD: "${DB_PASSWORD:-aciosa}"
      DB_NAME: "${DB_NAME:-aciosa}"
      DOCS_ROOT: /data/documents
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - aciosa-documents:/data/documents
    command: ["node", "scripts/reset.js"]
    profiles: ["tools"]

volumes:
  aciosa-db-data:
  aciosa-documents:
  nginx-certs:
  certbot-conf:
  certbot-webroot:
