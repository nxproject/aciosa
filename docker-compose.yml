services:
  app:
    build: .
    container_name: aciosa_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: aciosa
      DB_USER: aciosa
      DB_PASSWORD: aciosa_password
    depends_on:
      mariadb:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: aciosa_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mariadb:
    image: mariadb:11.4
    container_name: aciosa_mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: aciosa
      MARIADB_USER: aciosa
      MARIADB_PASSWORD: aciosa_password
      MARIADB_ROOT_PASSWORD: aciosa_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
