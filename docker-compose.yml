services:
  app:
    build: .
    container_name: aciosa_app
    restart: unless-stopped
    # Secrets are read from a .env file (see .env.example), never hardcoded here.
    env_file:
      - .env
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "3000"
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: "${DB_NAME:-aciosa}"
      DB_USER: "${DB_USER:-aciosa}"
      DB_PASSWORD: "${DB_PASSWORD:?set DB_PASSWORD in .env}"
      OPENWA_ENABLED: "${OPENWA_ENABLED:-true}"
      OPENWA_API_URL: "${OPENWA_API_URL:-http://openwa:8080}"
      OPENWA_API_KEY: "${OPENWA_API_KEY:?set OPENWA_API_KEY in .env}"
      DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD:-}"
      SESSION_SECRET: "${SESSION_SECRET:-}"
      SESSION_TTL_HOURS: "${SESSION_TTL_HOURS:-12}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      SEED_ADMINISTRATORS: "${SEED_ADMINISTRATORS:-}"
    depends_on:
      mariadb:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: aciosa_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  openwa:
    image: openwa/wa-automate
    container_name: aciosa_openwa
    init: true
    restart: unless-stopped
    environment:
      W_A_V: 4.76.0
    command:
      - --port
      - "8080"
      - --api-key
      - "${OPENWA_API_KEY:?set OPENWA_API_KEY in .env}"
      - --session-id
      - aciosa
    ports:
      - "8081:8080"
    volumes:
      - openwa_data:/sessions

  mariadb:
    image: mariadb:11.4
    container_name: aciosa_mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "${DB_NAME:-aciosa}"
      MARIADB_USER: "${DB_USER:-aciosa}"
      MARIADB_PASSWORD: "${DB_PASSWORD:?set DB_PASSWORD in .env}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env}"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
  openwa_data:
